<app-theme-toggle />
<section class="auth-screen">
  <div class="card auth-card">
    <div class="auth-logo">
      <span class="dot d1"></span>
      <span class="dot d2"></span>
      <span class="dot d3"></span>
    </div>

    <h1 class="auth-title">Reset your password</h1>
    <p class="auth-sub text-muted">
      Chatims is currently in closed beta. To reset your password, send an email
      to our support address and we'll get back to you within 24 hours.
    </p>

    <div class="support-card">
      <p class="support-label text-muted small">Contact</p>
      <a class="support-mail" href="mailto:support@chatims.app?subject=Password%20reset%20request">
        support&#64;chatims.app
      </a>
      <p class="text-muted small">
        Please include the email address you registered with so we can find your account.
      </p>
    </div>

    <p class="forgot-row">
      <a routerLink="/auth" class="link">← Back to sign in</a>
    </p>
  </div>
</section>
