<app-theme-toggle />
<section class="center-screen">
  <div class="container text-center stack">
    @if (status === 'searching') {
      <div class="search-pulse">
        <span></span><span></span><span></span>
      </div>
      <h2>Finding someone for you...</h2>
      <p class="text-muted">Matching based on your preferences.</p>
    } @else {
      <div class="empty">🙁</div>
      <h2>No match yet</h2>
      <p class="text-muted">{{ errorMessage }}</p>
      <div class="row" style="justify-content: center;">
        <button class="btn btn-ghost" (click)="back()">Change preferences</button>
        <button class="btn btn-primary" (click)="retry()">Try again</button>
      </div>
    }
  </div>
</section>
