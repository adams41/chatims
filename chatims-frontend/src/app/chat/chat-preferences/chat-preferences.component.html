<app-theme-toggle />
@if (!embedded) { <a class="back-btn" routerLink="/welcome" title="Back">←</a> }
<section class="pref-screen">
  <div class="pref-container">

    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progress"></div>
    </div>

    @if (!isDone) {
      @if (currentQuestion) {
        <div class="question-card">
          <h2>{{ currentQuestion.text }}</h2>
          <div class="options">
            @for (opt of currentQuestion.options; track opt) {
              <button
                class="opt-btn"
                [class.selected]="answers[currentQuestion.key] === opt"
                (click)="selectOption(opt)"
              >{{ opt }}</button>
            }
          </div>
        </div>
      }
    } @else {
      <div class="saving-state">
        @if (saving) {
          <div class="spinner"></div>
          <p class="text-muted">Saving your preferences…</p>
        }
        @if (error) {
          <p class="error">{{ error }}</p>
          <button class="opt-btn" (click)="reset()">Start over</button>
        }
      </div>
    }

  </div>
</section>
