<app-theme-toggle />
@if (!embedded) { <a class="back-btn" routerLink="/welcome" title="Back">←</a> }
<section class="pref-screen">
  <div class="pref-container">

    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="progress"></div>
    </div>

    @if (!isDone) {
      @if (currentQuestion; as q) {
        <div class="question-card">
          <h2>{{ q.text }}</h2>

          @if (q.key === 'ageRange') {
            <div class="age-range-picker">
              <div class="age-range-value">
                <span class="age-num">{{ minAge() }}</span>
                <span class="age-dash">–</span>
                <span class="age-num">{{ maxAge() }}</span>
              </div>
              <div class="slider-row">
                <label>Min</label>
                <input
                  type="range" min="18" max="99"
                  [value]="minAge()"
                  (input)="onMinAgeChange(($any($event.target)).value)"
                />
              </div>
              <div class="slider-row">
                <label>Max</label>
                <input
                  type="range" min="18" max="99"
                  [value]="maxAge()"
                  (input)="onMaxAgeChange(($any($event.target)).value)"
                />
              </div>
              <button class="opt-btn primary" (click)="confirmAgeRange()">Continue</button>
            </div>
          } @else {
            <div class="options">
              @for (opt of q.options ?? []; track opt) {
                <button
                  class="opt-btn"
                  [class.selected]="answers[q.key] === opt"
                  (click)="selectOption(opt)"
                >{{ opt }}</button>
              }
            </div>
          }
        </div>
      }
    } @else {
      <div class="saving-state">
        @if (saving) {
          <div class="spinner"></div>
          <p class="text-muted">Saving your preferences…</p>
        }
        @if (error) {
          <p class="error">{{ error }}</p>
          <button class="opt-btn" (click)="reset()">Start over</button>
        }
      </div>
    }

  </div>
</section>
