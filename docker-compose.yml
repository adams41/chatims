services:
  postgres:
    image: postgres:16-alpine
    container_name: chatims-postgres
    environment:
      POSTGRES_DB: chatims
      POSTGRES_USER: chatims
      POSTGRES_PASSWORD: chatims
    ports:
      - "5432:5432"
    volumes:
      - chatims-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatims -d chatims"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak-db:
    image: postgres:16-alpine
    container_name: chatims-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - chatims-keycloak-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: chatims-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "172.20.10.2"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "8180:8080"
    depends_on:
      - keycloak-db
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro

volumes:
  chatims-postgres-data:
  chatims-keycloak-data:
