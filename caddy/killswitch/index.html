<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatims — Paused</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0f1115;
      color: #e6e8ec;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box {
      padding: 2rem;
      max-width: 420px;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    p {
      margin: 0;
      color: #9aa0a6;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Chatims is paused</h1>
    <p>The service is temporarily offline. Check back later.</p>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      caches && caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  </script>
</body>
</html>
