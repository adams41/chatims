spring.application.name=chatims

# Datasource (Postgres)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatims}
spring.datasource.username=${DB_USERNAME:chatims}
spring.datasource.password=${DB_PASSWORD:chatims}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=600000

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# File uploads
file.upload-dir=${user.dir}/uploads
spring.web.resources.static-locations=classpath:/static/,file:uploads/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=${SERVER_PORT:8081}

# Keycloak (auth-server runs separately; default port 8180 to avoid clashing with frontend dev server on 4200 or backend on 8081)
keycloak.auth-server-url=${KEYCLOAK_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:chatims-app}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:chatims-client}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
keycloak.admin-user=${KEYCLOAK_ADMIN_USER:admin}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:chatims-app}

spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:chatims-client}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.keycloak.provider=keycloak
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:chatims-app}
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username
